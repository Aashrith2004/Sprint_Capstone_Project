[pytest]

# ─────────────────────────────────────────────────────────────
# Test Discovery
# ─────────────────────────────────────────────────────────────
pythonpath = .
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# ─────────────────────────────────────────────────────────────
# Pytest Options
# ─────────────────────────────────────────────────────────────
addopts =
    --alluredir=reports/allure-results
    -v
    --tb=short
    --strict-markers

# ─────────────────────────────────────────────────────────────
# Timeout Configuration
# ─────────────────────────────────────────────────────────────
timeout = 120
timeout_method = thread

# ─────────────────────────────────────────────────────────────
# Custom Markers
# ─────────────────────────────────────────────────────────────
markers =
    empty: marks tests for empty title validation
    ui: marks UI-only tests
    api: marks API-only tests
    e2e: marks end-to-end hybrid tests
    smoke: marks smoke/sanity tests
    regression: marks full regression tests
    negative: marks negative/error-path tests
    performance: marks performance-checking tests
    flaky: marks unstable tests

# ─────────────────────────────────────────────────────────────
# Logging
# ─────────────────────────────────────────────────────────────
log_cli = true
log_cli_level = INFO
log_cli_format = %(asctime)s [%(levelname)-8s] %(name)s — %(message)s
log_cli_date_format = %H:%M:%S

log_file = reports/logs/pytest.log
log_file_level = DEBUG
log_file_format = %(asctime)s [%(levelname)-8s] %(name)s:%(lineno)d — %(message)s
log_file_date_format = %Y-%m-%d %H:%M:%S